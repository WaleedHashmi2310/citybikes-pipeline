# profiles.yml

citybikes:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', 'citybikes.duckdb') }}"
      schema: main
      threads: 1

    prod:
        type: bigquery
        method: oauth
        project: "{{ env_var('DBT_BIGQUERY_PROJECT') }}"
        dataset: "{{ env_var('DBT_BIGQUERY_DATASET', 'citybikes') }}"
        location: "{{ env_var('DBT_BIGQUERY_LOCATION', 'europe-west1') }}"
        threads: 4
        timeout_seconds: 300
        priority: interactive
        retries: 1